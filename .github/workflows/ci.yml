name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules

  validate:
    name: Blueprint Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate blueprint structure
        run: bash scripts/validate-blueprints.sh
